name: Build data-build image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag to publish
        required: true
        default: py311

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push data-build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/runpod-data-build.Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/anatomical-neural-fm-data-build:${{ inputs.tag }}
            ttl.sh/anatomical-neural-fm-data-build-${{ inputs.tag }}:24h
